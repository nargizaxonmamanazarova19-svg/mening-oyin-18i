<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katta O'yin - Saqlash bilan</title>
    <style>
        body { 
            background-color: #1a1a2e; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 25px; 
            width: 98%; 
            height: 80vh; 
            max-width: 1600px; 
        }

        .card { 
            background-color: #16213e; 
            border: 5px solid #0f3460; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            position: relative; 
            padding: 15px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        .card textarea { 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            border: none; 
            color: white; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold;
            resize: none; 
            font-family: inherit;
        }

        .card.active { 
            background-color: #e94560; 
            font-size: 100px; 
            font-weight: bold; 
            border-color: #fff;
        }

        .controls { 
            margin-bottom: 20px; 
            display: flex;
            gap: 20px;
        }
        
        button { 
            padding: 15px 40px; 
            background-color: #e94560; 
            border: none; 
            color: white; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 22px; 
            font-weight: bold; 
        }
        
        button#reset-btn { background-color: #555; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="start-btn" onclick="startGame()">O'yinni boshlash</button>
        <button id="reset-btn" onclick="clearData()">Ismlarni o'chirish</button>
        <button onclick="location.reload()">Yangilash</button>
    </div>

    <div id="game-grid" class="grid"></div>

    <script>
        const grid = document.getElementById('game-grid');
        const startBtn = document.getElementById('start-btn');
        let isGameStarted = false;
        let randomNumbers = Array.from({length: 18}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

        function createBoard() {
            // Avval saqlangan ismlarni olamiz
            const savedNames = JSON.parse(localStorage.getItem('oyinchiIsmlari')) || {};

            for (let i = 0; i < 18; i++) {
                const card = document.createElement('div');
                card.classList.add('card');
                
                const txt = document.createElement('textarea');
                txt.placeholder = (i + 1) + "-katak";
                
                // Agar saqlangan ism bo'lsa, uni joylashtiramiz
                if (savedNames[i]) {
                    txt.value = savedNames[i];
                }

                // Har bir harf yozilganda avtomat saqlaydi
                txt.oninput = function() {
                    saveAllNames();
                };

                card.onclick = function(e) {
                    if (isGameStarted && !this.classList.contains('active')) {
                        this.innerHTML = randomNumbers[i]; 
                        this.classList.add('active');
                    }
                };
                
                card.appendChild(txt);
                grid.appendChild(card);
            }
        }

        function saveAllNames() {
            const names = {};
            document.querySelectorAll('textarea').forEach((t, index) => {
                names[index] = t.value;
            });
            localStorage.setItem('oyinchiIsmlari', JSON.stringify(names));
        }

        function clearData() {
            if(confirm("Barcha ismlarni o'chirib tashlamoqchimisiz?")) {
                localStorage.removeItem('oyinchiIsmlari');
                location.reload();
            }
        }

        function startGame() {
            isGameStarted = true;
            startBtn.disabled = true;
            document.querySelectorAll('textarea').forEach(t => {
                t.disabled = true;
                t.style.pointerEvents = "none"; 
            });
            saveAllNames(); // Oxirgi holatni saqlab qo'yadi
        }

        createBoard();
    </script>
</body>
</html>
