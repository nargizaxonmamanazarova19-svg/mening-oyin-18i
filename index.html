<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katta O'yin</title>
    <style>
        body { 
            background-color: #1a1a2e; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; /* Ekranni to'liq bo'yi bo'yicha markazlash */
            margin: 0; 
            overflow: hidden; /* Ekran qimirlamasligi uchun */
        }

        /* KATAKLARNI MAKSIMAL KATTA QILDIK */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 25px; /* Kataklar orasidagi masofa */
            width: 98%; 
            height: 80vh; /* Kataklar ekranning 80% bo'yini egallaydi */
            max-width: 1600px; 
        }

        .card { 
            background-color: #16213e; 
            border: 5px solid #0f3460; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            position: relative; 
            padding: 15px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        /* ISMLAR UCHUN TEXTAREA */
        .card textarea { 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            border: none; 
            color: white; 
            text-align: center; 
            font-size: 28px; /* Ismlar juda katta */
            font-weight: bold;
            resize: none; 
            pointer-events: auto; 
            font-family: inherit;
        }

        /* RAQAMLAR EKRANDA GIGANT KO'RINADI */
        .card.active { 
            background-color: #e94560; 
            font-size: 100px; /* Raqamni juda katta qildik! */
            font-weight: bold; 
            border-color: #fff;
            color: white;
        }

        .controls { 
            margin-bottom: 20px; 
            display: flex;
            gap: 20px;
        }
        
        button { 
            padding: 15px 40px; 
            background-color: #e94560; 
            border: none; 
            color: white; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 22px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        
        button:hover { background-color: #ff5e78; }
        button:disabled { background-color: #555; opacity: 0.7; }

        @media (max-width: 1000px) { 
            .grid { grid-template-columns: repeat(3, 1fr); height: auto; }
            .card { aspect-ratio: 1/1; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="start-btn" onclick="startGame()">O'yinni boshlash</button>
        <button onclick="location.reload()">Yangilash</button>
    </div>

    <div id="game-grid" class="grid"></div>

    <script>
        const grid = document.getElementById('game-grid');
        const startBtn = document.getElementById('start-btn');
        let isGameStarted = false;
        
        // 18 ta random raqam
        let randomNumbers = Array.from({length: 18}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

        function createBoard() {
            for (let i = 0; i < 18; i++) {
                const card = document.createElement('div');
                card.classList.add('card');
                
                const txt = document.createElement('textarea');
                txt.placeholder = (i + 1) + "-katak";
                card.appendChild(txt);

                card.onclick = function() {
                    if (isGameStarted && !this.classList.contains('active')) {
                        this.innerHTML = randomNumbers[i]; 
                        this.classList.add('active');
                    }
                };
                grid.appendChild(card);
            }
        }

        function startGame() {
            isGameStarted = true;
            startBtn.disabled = true;
            document.querySelectorAll('textarea').forEach(t => {
                t.disabled = true;
                t.style.pointerEvents = "none"; 
            });
        }

        createBoard();
    </script>
</body>
</html>
