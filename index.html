<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18 Talik O'yin</title>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 95%; max-width: 1000px; }
        .card { 
            aspect-ratio: 1 / 1; background-color: #16213e; border: 3px solid #0f3460; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; padding: 5px; box-sizing: border-box; 
        }
        .card textarea { 
            width: 100%; height: 100%; background: transparent; border: none; color: white; 
            text-align: center; font-size: 14px; resize: none; pointer-events: none; /* Raqam chiqishiga xalaqit bermasligi uchun */
        }
        .card.editable textarea { pointer-events: auto; } /* Faqat o'yin boshlanishidan oldin yozish mumkin */
        
        .card.active { background-color: #e94560; font-size: 30px; font-weight: bold; }
        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; background-color: #e94560; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <h2>18 Talik Kataklar</h2>
    <div class="controls">
        <button id="start-btn" onclick="startGame()">O'yinni boshlash</button>
        <button onclick="location.reload()">Yangilash</button>
    </div>
    <div id="game-grid" class="grid"></div>

    <script>
        const grid = document.getElementById('game-grid');
        const startBtn = document.getElementById('start-btn');
        let isGameStarted = false;
        let randomNumbers = Array.from({length: 18}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

        function createBoard() {
            for (let i = 0; i < 18; i++) {
                const card = document.createElement('div');
                card.classList.add('card', 'editable');
                
                const txt = document.createElement('textarea');
                txt.placeholder = (i + 1) + "-katak";
                card.appendChild(txt);

                card.onclick = function() {
                    if (isGameStarted && !this.classList.contains('active')) {
                        this.innerHTML = randomNumbers[i]; // Raqamni chiqarish
                        this.classList.add('active');
                    }
                };
                grid.appendChild(card);
            }
        }

        function startGame() {
            isGameStarted = true;
            startBtn.disabled = true;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('editable'));
            document.querySelectorAll('textarea').forEach(t => t.disabled = true);
            alert("O'yin boshlandi! Kataklarni bosing.");
        }
        createBoard();
    </script>
</body>
</html>
